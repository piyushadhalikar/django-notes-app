apiVersion: apps/v1
kind: Deployment
metadata:
  name: notes-app-deployment
  namespace: notes-app
  labels:
    app: notes-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notes-app
  template:
    metadata:
      labels:
        app: notes-app
    spec:
      containers:
      - name: notes-app
        image: piyusha19/notes-app
        ports:
        - containerPort: 8000

#Output:

kubectl apply -f deployment.yml 
deployment.apps/notes-app-deployment created
